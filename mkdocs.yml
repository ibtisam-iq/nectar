site_name: Nectar
site_url: https://nectar.ibtisam-iq.com
site_description: >-
  Personal engineering knowledge base by Muhammad Ibtisam: first-principles notes
  on Kubernetes, AWS, CI/CD, GitOps, and DevSecOps. Every tool approached from
  its problem up, not its documentation down.
site_author: Muhammad Ibtisam

repo_name: ibtisam-iq/nectar
repo_url: https://github.com/ibtisam-iq/nectar

docs_dir: .  # repo root as docs source; requires same-dir plugin

copyright: >-
  Copyright &copy; 2026
  <a href="https://www.linkedin.com/in/ibtisam-iq/" target="_blank" rel="noopener">Muhammad Ibtisam</a>.
  All rights reserved.

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: docs/images/favicon.svg
  favicon: docs/images/favicon.ico
  # Space Grotesk (display face) is loaded and applied in extra.css via @import;
  # Material exposes only one text font slot, so heading overrides live in CSS.
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - same-dir
  - awesome-pages:
      strict: false
  - section-index
  - autorefs
  - social:
      cards_layout_options:
        background_color: "#0d1420"
        color: "#e6edf6"
        font_family: Space Grotesk
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: "Link to this section"
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
exclude_docs: |
  *.py
  *.sh
  *.conf
  *.yaml
  *.yml
  *.json
  *.log
  *.txt
  .github/
  site/
  .cache/
  .vscode/
  .idea/
  *.swp
  *.swo
  *.bak
  .git/
  .gitignore
  .gitattributes
  requirements.txt

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: relative_to_docs
    unrecognized_links: warn

extra:
  analytics:
    provider: google
    property: G-2462M218X9
  social:
    - icon: custom/credly
      link: https://www.credly.com/users/ibtisam-iq/badges#credly
      name: View my Credly badges
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ibtisam-iq/
      name: Connect with me on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/ibtisam-iq
      name: Follow me on GitHub
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/mibtisam
      name: View my Docker Hub repositories
    - icon: fontawesome/solid/globe
      link: https://ibtisam-iq.com
      name: Visit my personal website
  generator: false

extra_css:
  - docs/stylesheets/extra.css

extra_javascript:
  - docs/javascripts/extra.js
